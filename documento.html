<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Documento Amelie</title>
    <style>
        body {
    font-family: "Times New Roman", serif;
    background: #ffffff;
    color: #111;
    line-height: 1.6;
    margin: 40px;
}

.document {
    max-width: 900px;
    margin: auto;
}

h1, h2, h3 {
    font-weight: bold;
    margin-top: 1.5em;
}

h1 {
    font-size: 28px;
    text-align: center;
}

h2 {
    font-size: 22px;
    border-bottom: 1px solid #ccc;
    padding-bottom: 5px;
}

p {
    text-align: justify;
}

code {
    background: #f5f5f5;
    padding: 2px 4px;
}

pre {
    background: #f5f5f5;
    padding: 10px;
    overflow-x: auto;
}

table {
    border-collapse: collapse;
    width: 100%;
    margin: 20px 0;
}

table, th, td {
    border: 1px solid #444;
}

th, td {
    padding: 8px;
    text-align: left;
}

blockquote {
    border-left: 4px solid #999;
    padding-left: 10px;
    color: #555;
}
    </style>
</head>
<body>
    <main class="document">
        <h1 id="prueba-amelie-md">Prueba Amelie MD</h1>
<p>Este es un documento de prueba.</p>
<h2 id="seccion-tecnica">Sección técnica</h2>
<table>
<thead>
<tr>
<th>Campo</th>
<th>Valor</th>
</tr>
</thead>
<tbody>
<tr>
<td>Estado</td>
<td>MVP</td>
</tr>
</tbody>
</table>
    </main>
</body>
</html>

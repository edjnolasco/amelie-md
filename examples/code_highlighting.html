h1,

}

pre {
    background: #f5f5f5;
    padding: 12px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-word;
}

pre code {
    display: block;
    white-space: pre-wrap;
}

table {
    border-collapse: collapse;
    width: 100%;
    margin: 18px 0;
    font-size: 10.5pt;
}

table,
th,
td {
    border: 1px solid #d0d7de;
}

th,
td {
    padding: 8px 10px;
    text-align: left;
    vertical-align: top;
}

th {
    background: #f6f8fa;
    font-weight: 600;
}

blockquote {
    color: #57606a;
    border-left: 4px solid #d0d7de;
    padding-left: 12px;
    margin-left: 0;
}

pre code {
    font-family: "Courier New", monospace;
    font-size: 10pt;
}
